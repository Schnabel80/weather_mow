name: Daily GitHub Issue Check

on:
  schedule:
    - cron: '0 3 * * *'  # 05:00 Uhr CEST (UTC+2) / 04:00 Uhr CET (UTC+1)
  workflow_dispatch:       # Manueller Start jederzeit möglich

jobs:
  check-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Check issues and create daily report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          pip install anthropic requests --quiet
          python3 << 'PYTHON'
          import json, os, sys, requests
          from datetime import date

          TOKEN = os.environ["GH_TOKEN"]
          ANTHROPIC_KEY = os.environ.get("ANTHROPIC_API_KEY", "")
          TODAY = date.today().strftime("%d.%m.%Y")
          REPORT_REPO = "Schnabel80/weather_mow"

          gh_headers = {
              "Authorization": f"Bearer {TOKEN}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          # Duplikat-Check: Wurde heute bereits ein Report erstellt?
          existing = requests.get(
              f"https://api.github.com/repos/{REPORT_REPO}/issues",
              headers=gh_headers,
              params={"labels": "daily-report", "state": "open", "per_page": 10},
          ).json()
          for issue in (existing if isinstance(existing, list) else []):
              if TODAY in issue.get("title", ""):
                  print(f"Report fuer {TODAY} existiert bereits: #{issue['number']}")
                  sys.exit(0)

          # Issues aller Repositories abrufen
          repos = [
              "Schnabel80/weather_mow",
              "Schnabel80/navimow-i105-ha",
              "Schnabel80/homeassistant-vw-images",
              "Schnabel80/biterisk-ha",
          ]

          all_issues = {}
          for repo in repos:
              resp = requests.get(
                  f"https://api.github.com/repos/{repo}/issues",
                  headers=gh_headers,
                  params={"state": "open", "per_page": 50},
              )
              if resp.ok:
                  # Pull Requests herausfiltern
                  all_issues[repo] = [i for i in resp.json() if "pull_request" not in i]
              else:
                  print(f"Warnung: {repo} nicht erreichbar ({resp.status_code})")
                  all_issues[repo] = []

          total_issues = sum(len(v) for v in all_issues.values())

          # Report generieren
          if ANTHROPIC_KEY:
              import anthropic

              issues_data = {
                  repo: [
                      {
                          "number": i["number"],
                          "title": i["title"],
                          "user": i["user"]["login"],
                          "created_at": i["created_at"][:10],
                          "labels": [l["name"] for l in i.get("labels", [])],
                          "body": (i.get("body") or "")[:600],
                      }
                      for i in issues
                  ]
                  for repo, issues in all_issues.items()
              }

              client = anthropic.Anthropic(api_key=ANTHROPIC_KEY)
              msg = client.messages.create(
                  model="claude-opus-4-8",
                  max_tokens=4096,
                  messages=[
                      {
                          "role": "user",
                          "content": f"""Du bist ein erfahrener Entwickler, spezialisiert auf Home Assistant Custom Integrations in Python.

Erstelle einen taeglich generierten GitHub Issue-Report auf Deutsch fuer die Repositories von Schnabel80.

Offene Issues (JSON):
{json.dumps(issues_data, ensure_ascii=False, indent=2)}

Erstelle den Report in folgendem Format:

## Taeglich GitHub Issue-Report — {TODAY}

Fuer jedes Repository mit offenen Issues:
### [Repository-Name] — N offene Issues

**Issue #X — [Titel]**
- **Gemeldet von:** @user am DD.MM.YYYY
- **Problem:** Kurze, klare Zusammenfassung was der Nutzer beschreibt
- **Analyse:** Welche Komponente/Datei ist betroffen? Was ist die wahrscheinliche Ursache?
- **Schweregrad:** kritisch / mittel / niedrig
- **Loesungsansatz:** Konkrete erste Massnahme oder Untersuchungsrichtung

---

### Gesamtfazit
Kompakter Ueberblick: Gesamtzahl, was ist dringend, empfohlene Reihenfolge.

Falls keine Issues offen sind, schreibe nur:
## Taeglich GitHub Issue-Report — {TODAY}
Alle Repositories sind sauber — keine offenen Issues. Gute Arbeit!
""",
                      }
                  ],
              )
              report = msg.content[0].text
          else:
              lines = [
                  f"## Taeglich GitHub Issue-Report — {TODAY}\n",
                  "> **Hinweis:** Kein `ANTHROPIC_API_KEY` als Repository-Secret konfiguriert. "
                  "KI-Analyse nicht verfuegbar — nur Rohdaten.\n",
              ]
              if total_issues == 0:
                  lines.append("Alle Repositories sind sauber — keine offenen Issues.")
              else:
                  for repo, issues in all_issues.items():
                      if not issues:
                          continue
                      name = repo.split("/")[1]
                      lines.append(f"\n### {name} ({len(issues)} Issues)")
                      for iss in issues:
                          lines.append(f"\n**Issue #{iss['number']} — {iss['title']}**")
                          lines.append(f"- Gemeldet von @{iss['user']['login']} am {iss['created_at'][:10]}")
                          body = (iss.get("body") or "").strip()[:400]
                          if body:
                              lines.append(f"- Beschreibung: {body}")
                  lines.append(f"\n---\n### Gesamtfazit\n{total_issues} offene Issues insgesamt.")
              report = "\n".join(lines)

          # Label anlegen (schlaegt still fehl wenn es schon existiert)
          requests.post(
              f"https://api.github.com/repos/{REPORT_REPO}/labels",
              headers=gh_headers,
              json={"name": "daily-report", "color": "0075ca", "description": "Automatischer Tagesbericht"},
          )

          # Report als GitHub Issue erstellen
          resp = requests.post(
              f"https://api.github.com/repos/{REPORT_REPO}/issues",
              headers=gh_headers,
              json={
                  "title": f"Daily Issue Report — {TODAY}",
                  "body": report,
                  "labels": ["daily-report"],
              },
          )
          if resp.ok:
              print(f"Report erstellt: {resp.json()['html_url']}")
          else:
              print(f"Fehler beim Erstellen des Reports: {resp.status_code} {resp.text}")
              sys.exit(1)
          PYTHON
